services:
  conectmw:
    build: .
    image: conectmw:latest
    container_name: conectmw
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    environment:
      PORT: 8000
      APP_PASSWORD: ${APP_PASSWORD:-}
      SECRET_KEY: ${SECRET_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      DATA_DIR: /data
      SMB_CONNECT_TIMEOUT: ${SMB_CONNECT_TIMEOUT:-10}
    volumes:
      - conectmw_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  conectmw_data:
